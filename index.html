<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 3 - Galeria Lightbox</title>
    <link rel="stylesheet" href="css/componente.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="contenedor">
        <section class="encabezado">
            <p class="etiqueta">Actividad 3</p>
            <h1>Galeria Lightbox</h1>
            <p class="subtitulo">Componente visual para ver imagenes en grande y navegar entre ellas.</p>
        </section>

        <section class="panel-galeria">
            <h2>Mis imagenes</h2>

            <div class="galeria">
                <figure class="tarjeta-imagen">
                    <img class="imagen-galeria" src="img/imagen1.jpeg" data-titulo="Imagen 1" alt="Imagen 1">
                    <figcaption>Imagen 1</figcaption>
                </figure>

                <figure class="tarjeta-imagen">
                    <img class="imagen-galeria" src="img/imagen2.jpg" data-titulo="Imagen 2" alt="Imagen 2">
                    <figcaption>Imagen 2</figcaption>
                </figure>

                <figure class="tarjeta-imagen">
                    <img class="imagen-galeria" src="img/imagen3.jpg" data-titulo="Imagen 3" alt="Imagen 3">
                    <figcaption>Imagen 3</figcaption>
                </figure>

                <figure class="tarjeta-imagen">
                    <img class="imagen-galeria" src="img/imagen4.jpg" data-titulo="Imagen 4" alt="Imagen 4">
                    <figcaption>Imagen 4</figcaption>
                </figure>

                <figure class="tarjeta-imagen">
                    <img class="imagen-galeria" src="img/imagen5.jpg" data-titulo="Imagen 5" alt="Imagen 5">
                    <figcaption>Imagen 5</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <script src="js/componente.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
